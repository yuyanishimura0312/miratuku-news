<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日次分析レポート アーカイブ | Insight News</title>
  <link rel="icon" href="https://esse-sense.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       DESIGN SYSTEM — Miratuku CI
       ============================================================ */
    :root {
      --bg: #FDFAF7;
      --card: #ffffff;
      --accent: #7A4033;
      --accent-soft: #B07256;
      --accent-warm: #DC8766;
      --text: #2D2017;
      --text-secondary: #6B5445;
      --text-muted: #7A6B5E;
      --border: #D9C8B8;
      --surface: #F5EFE8;
      --highlight-bg: #FFF5ED;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.12), 0 8px 24px rgba(0,0,0,0.06);
      --overlay: rgba(45, 32, 23, 0.5);
      --font-serif: 'Noto Serif JP', 'Georgia', 'Times New Roman', serif;
      --font-sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    [data-theme="dark"] {
      --bg: #1A1410;
      --card: #241E18;
      --accent: #DC8766;
      --accent-soft: #C49478;
      --accent-warm: #E8A080;
      --text: #E8DDD4;
      --text-secondary: #B8A898;
      --text-muted: #8A7D72;
      --border: #3D342B;
      --surface: #2A231C;
      --highlight-bg: #2E2318;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.12);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.18);
      --overlay: rgba(0, 0, 0, 0.7);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      line-height: 1.8;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent-warm); text-decoration: underline; }

    h1, h2, h3, h4 {
      font-family: var(--font-serif);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .site-header {
      background: var(--accent);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    [data-theme="dark"] .site-header {
      background: #2D2017;
    }

    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .back-link {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; text-decoration: none; }

    .site-logo {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      white-space: nowrap;
      text-decoration: none;
    }
    .site-logo:hover { text-decoration: none; color: #fff; }

    .site-logo-sub {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: block;
      margin-top: -2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    /* Region toggle */
    .region-toggle {
      display: flex;
      background: rgba(255,255,255,0.12);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .region-toggle button {
      padding: 0.28rem 0.65rem;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .region-toggle button.active {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    .region-toggle button:hover:not(.active) {
      background: rgba(255,255,255,0.1);
    }

    /* Theme toggle */
    .theme-toggle {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      padding: 0.28rem 0.5rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.8);
      line-height: 1;
      transition: background 0.2s;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.2); }

    /* ============================================================
       MAIN CONTENT
       ============================================================ */
    .page-intro {
      padding: 2rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .page-intro h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
    }

    .page-intro p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Loading & Error */
    .loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);
    }

    .loading-spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 3rem 0;
      color: var(--accent);
    }

    /* ============================================================
       REPORT CARD LIST
       ============================================================ */
    .report-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-bottom: 3rem;
    }

    .report-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .report-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--accent-soft);
    }

    .report-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .report-card-date {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
    }

    .report-card-model {
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    .report-card-preview {
      color: var(--text-secondary);
      font-size: 0.88rem;
      line-height: 1.7;
      margin-bottom: 0.8rem;
      /* Clamp to ~3 lines */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .report-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .report-card-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-read {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      background: var(--highlight-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-read:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ============================================================
       MODAL — Full report view
       ============================================================ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 500;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    .modal-overlay.open {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .modal-content {
      background: var(--card);
      border-radius: 12px;
      max-width: 900px;
      width: 100%;
      padding: 2.5rem;
      box-shadow: var(--shadow-md);
      position: relative;
      margin: 1rem auto;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .modal-title {
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }

    .modal-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 1.8rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    /* Report text rendered from markdown */
    .report-body {
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--text);
    }

    .report-body h1 { font-size: 1.4rem; margin: 2rem 0 0.8rem; }
    .report-body h2 { font-size: 1.2rem; margin: 1.8rem 0 0.6rem; }
    .report-body h3 { font-size: 1.05rem; margin: 1.4rem 0 0.5rem; }
    .report-body p { margin-bottom: 1rem; }
    .report-body ul, .report-body ol { margin: 0.5rem 0 1rem 1.5rem; }
    .report-body li { margin-bottom: 0.3rem; }
    .report-body strong { font-weight: 700; }
    .report-body em { font-style: italic; }
    .report-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: var(--highlight-bg);
      border-radius: 0 6px 6px 0;
      color: var(--text-secondary);
    }
    .report-body code {
      background: var(--surface);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.88em;
    }
    .report-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ============================================================
       SECTIONS: Observations, Implications, Myths
       ============================================================ */
    .section-divider {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--border);
    }

    .section-title {
      font-size: 1.15rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
    }

    .insight-card-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .insight-card-text {
      font-size: 0.87rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* Myths comparison */
    .myths-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-top: 0.8rem;
    }

    .myths-column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
    }

    .myths-column h4 {
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .myths-column.declining h4 { color: var(--text-muted); }
    .myths-column.emerging h4 { color: var(--accent); }

    .myth-item {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-secondary);
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .myth-item:last-child { border-bottom: none; }

    [data-theme="dark"] .myth-item {
      border-bottom-color: rgba(255,255,255,0.04);
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    .site-footer {
      text-align: center;
      padding: 2rem 0;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 640px) {
      .header-main { flex-wrap: wrap; gap: 0.5rem; }
      .modal-content { padding: 1.5rem; }
      .myths-compare { grid-template-columns: 1fr; }
      .insight-grid { grid-template-columns: 1fr; }
      .page-intro h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container">
      <div class="header-main">
        <div class="header-left">
          <a href="app.html" class="back-link">&larr; ニュースに戻る</a>
          <a href="reports.html" class="site-logo">
            日次分析レポート
            <span class="site-logo-sub">Daily Analysis Archive</span>
          </a>
        </div>
        <div class="header-right">
          <div class="region-toggle">
            <button class="active" data-region="japan">日本版</button>
            <button data-region="global">グローバル版</button>
          </div>
          <button class="theme-toggle" id="themeToggle" title="テーマ切替">&#9789;</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="container">
    <div class="page-intro">
      <h1>レポート アーカイブ</h1>
      <p>AI による日次分析レポートの一覧です。日本版とグローバル版を切り替えてご覧いただけます。</p>
    </div>

    <div id="reportList" class="report-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>レポートを読み込んでいます...</p>
      </div>
    </div>
  </main>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      Miratuku Future Insight News &mdash; Daily Analysis Reports
    </div>
  </footer>

  <script>
    /* ============================================================
       STATE
       ============================================================ */
    const DATA_URL = 'https://yuyanishimura0312.github.io/future-insight-app/data/daily_report.json';
    let allReports = [];   // Array of report objects (currently 1, will grow)
    let currentRegion = 'japan';

    /* ============================================================
       THEME
       ============================================================ */
    const themeToggle = document.getElementById('themeToggle');
    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      themeToggle.textContent = dark ? '\u2600' : '\u263D';
      localStorage.setItem('news-theme', dark ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      applyTheme(!isDark);
    });
    // Restore saved theme
    const savedTheme = localStorage.getItem('news-theme');
    if (savedTheme === 'dark') applyTheme(true);

    /* ============================================================
       REGION TOGGLE
       ============================================================ */
    document.querySelectorAll('.region-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.region-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRegion = btn.dataset.region;
        renderList();
      });
    });

    /* ============================================================
       SIMPLE MARKDOWN PARSER
       ============================================================ */
    function mdToHtml(md) {
      if (!md) return '';
      let html = md
        // Escape HTML entities
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Headings (### before ## before #)
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Horizontal rules
      html = html.replace(/^---+$/gm, '<hr>');

      // Bold & italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Blockquotes
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

      // Unordered lists: collect consecutive lines starting with "- "
      html = html.replace(/(^- .+$(\n- .+$)*)/gm, (match) => {
        const items = match.split('\n').map(l => '<li>' + l.replace(/^- /, '') + '</li>').join('');
        return '<ul>' + items + '</ul>';
      });

      // Ordered lists
      html = html.replace(/(^\d+\. .+$(\n\d+\. .+$)*)/gm, (match) => {
        const items = match.split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
        return '<ol>' + items + '</ol>';
      });

      // Paragraphs: wrap remaining plain text lines
      // Split by double newlines, wrap non-tag blocks in <p>
      html = html.split(/\n{2,}/).map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-6]|ul|ol|blockquote|hr|p)/.test(block)) return block;
        return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
      }).join('\n');

      return html;
    }

    /* ============================================================
       FETCH DATA
       ============================================================ */
    async function fetchReports() {
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // Normalize: support single object or array
        if (Array.isArray(data)) {
          allReports = data;
        } else {
          allReports = [data];
        }

        // Sort by generated_at descending (newest first)
        allReports.sort((a, b) => (b.generated_at || '').localeCompare(a.generated_at || ''));

        renderList();
      } catch (err) {
        document.getElementById('reportList').innerHTML =
          '<div class="error-msg"><p>レポートの読み込みに失敗しました。</p><p style="font-size:0.8rem;color:var(--text-muted);">' +
          err.message + '</p></div>';
      }
    }

    /* ============================================================
       RENDER LIST
       ============================================================ */
    function renderList() {
      const container = document.getElementById('reportList');

      if (allReports.length === 0) {
        container.innerHTML = '<div class="error-msg"><p>レポートはまだありません。</p></div>';
        return;
      }

      container.innerHTML = allReports.map((report, idx) => {
        const regionData = report[currentRegion] || report.japan || report.global || {};
        const text = regionData.report_text || '';
        // Extract plain text for preview (strip markdown markers)
        const preview = text
          .replace(/^#{1,3}\s+/gm, '')
          .replace(/\*{1,3}/g, '')
          .replace(/`/g, '')
          .substring(0, 200);

        const dateStr = formatDate(report.generated_at);
        const model = report.model || '';
        const obsCount = (regionData.observations || []).length;
        const implCount = (regionData.implications || []).length;

        return `
          <div class="report-card" data-index="${idx}">
            <div class="report-card-header">
              <span class="report-card-date">${dateStr}</span>
              ${model ? '<span class="report-card-model">' + escHtml(model) + '</span>' : ''}
            </div>
            <div class="report-card-preview">${escHtml(preview)}...</div>
            <div class="report-card-footer">
              <span class="report-card-meta">
                ${obsCount > 0 ? obsCount + '件の観測' : ''}
                ${obsCount > 0 && implCount > 0 ? ' / ' : ''}
                ${implCount > 0 ? implCount + '件のインプリケーション' : ''}
              </span>
              <button class="btn-read">全文を読む</button>
            </div>
          </div>`;
      }).join('');

      // Bind click events
      container.querySelectorAll('.report-card').forEach(card => {
        card.addEventListener('click', () => {
          const idx = parseInt(card.dataset.index, 10);
          openReport(idx);
        });
      });
    }

    /* ============================================================
       OPEN REPORT (Modal)
       ============================================================ */
    function openReport(idx) {
      const report = allReports[idx];
      if (!report) return;

      const regionData = report[currentRegion] || report.japan || report.global || {};
      const dateStr = formatDate(report.generated_at);
      const regionLabel = currentRegion === 'japan' ? '日本版' : 'グローバル版';

      let html = '';

      // Title
      html += `<h2 class="modal-title">${dateStr} ${regionLabel} 分析レポート</h2>`;
      html += `<div class="modal-subtitle">生成日時: ${report.generated_at || '不明'}${report.model ? ' / モデル: ' + escHtml(report.model) : ''}</div>`;

      // Report text
      html += '<div class="report-body">' + mdToHtml(regionData.report_text || '') + '</div>';

      // Observations
      const obs = regionData.observations || [];
      if (obs.length > 0) {
        html += '<div class="section-divider">';
        html += '<h3 class="section-title">観測 (Observations)</h3>';
        html += '<div class="insight-grid">';
        obs.forEach(o => {
          html += `
            <div class="insight-card">
              <div class="insight-card-label">${escHtml(o.category || '')}</div>
              <div class="insight-card-text">${escHtml(o.observation || '')}</div>
            </div>`;
        });
        html += '</div></div>';
      }

      // Implications
      const impl = regionData.implications || [];
      if (impl.length > 0) {
        html += '<div class="section-divider">';
        html += '<h3 class="section-title">インプリケーション (Implications)</h3>';
        html += '<div class="insight-grid">';
        impl.forEach(i => {
          html += `
            <div class="insight-card">
              <div class="insight-card-label">${escHtml(i.area || '')}</div>
              <div class="insight-card-text">${escHtml(i.implication || '')}</div>
            </div>`;
        });
        html += '</div></div>';
      }

      // Myths
      const declining = regionData.declining_myths || [];
      const emerging = regionData.emerging_myths || [];
      if (declining.length > 0 || emerging.length > 0) {
        html += '<div class="section-divider">';
        html += '<h3 class="section-title">神話の変遷 (Myth Dynamics)</h3>';
        html += '<div class="myths-compare">';

        html += '<div class="myths-column declining"><h4>衰退する神話</h4>';
        if (declining.length > 0) {
          declining.forEach(m => {
            const text = typeof m === 'string' ? m : (m.myth || m.description || JSON.stringify(m));
            html += '<div class="myth-item">' + escHtml(text) + '</div>';
          });
        } else {
          html += '<div class="myth-item" style="color:var(--text-muted);">データなし</div>';
        }
        html += '</div>';

        html += '<div class="myths-column emerging"><h4>浮上する神話</h4>';
        if (emerging.length > 0) {
          emerging.forEach(m => {
            const text = typeof m === 'string' ? m : (m.myth || m.description || JSON.stringify(m));
            html += '<div class="myth-item">' + escHtml(text) + '</div>';
          });
        } else {
          html += '<div class="myth-item" style="color:var(--text-muted);">データなし</div>';
        }
        html += '</div>';

        html += '</div></div>';
      }

      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    /* ============================================================
       MODAL CLOSE
       ============================================================ */
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* ============================================================
       UTILS
       ============================================================ */
    function formatDate(isoStr) {
      if (!isoStr) return '日付不明';
      try {
        const d = new Date(isoStr);
        const year = d.getFullYear();
        const month = d.getMonth() + 1;
        const day = d.getDate();
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        const dow = weekdays[d.getDay()];
        return `${year}年${month}月${day}日 (${dow})`;
      } catch {
        return isoStr;
      }
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ============================================================
       INIT
       ============================================================ */
    fetchReports();
  </script>
</body>
</html>
