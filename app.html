<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miratuku Future Insight News</title>
  <link rel="icon" href="https://esse-sense.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS Variables (Light Mode) ===== */
    :root {
      --bg: #FDFAF7;
      --card: #ffffff;
      --accent: #7A4033;
      --accent-soft: #B07256;
      --accent-warm: #DC8766;
      --text: #2D2017;
      --text-secondary: #6B5445;
      --text-muted: #7A6B5E;
      --border: #D9C8B8;
      --surface: #F5EFE8;
      --highlight-bg: #FFF5ED;
      --shadow: rgba(45, 32, 23, 0.06);
      --shadow-hover: rgba(45, 32, 23, 0.12);
      --overlay: rgba(45, 32, 23, 0.4);
      /* PESTLE colors */
      --P: #8B3D2F;
      --E: #B87A4A;
      --S: #4F7A47;
      --T: #3A7A96;
      --L: #6B4F82;
      --En: #2D7A6B;
    }

    /* ===== Dark Mode ===== */
    [data-theme="dark"] {
      --bg: #1A1410;
      --card: #241E18;
      --accent: #DC8766;
      --accent-soft: #C49478;
      --accent-warm: #E8A080;
      --text: #E8DDD4;
      --text-secondary: #B8A898;
      --text-muted: #8A7D72;
      --border: #3D342B;
      --surface: #2A231C;
      --highlight-bg: #2E2318;
      --shadow: rgba(0, 0, 0, 0.2);
      --shadow-hover: rgba(0, 0, 0, 0.35);
      --overlay: rgba(0, 0, 0, 0.6);
      --P: #C06050;
      --E: #D4956A;
      --S: #6A9A60;
      --T: #5A9AB0;
      --L: #8A70A0;
      --En: #4A9A88;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== Layout ===== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* ===== Header ===== */
    .site-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 0;
    }

    .site-logo {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Region Toggle */
    .region-toggle {
      display: flex;
      background: var(--surface);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .region-toggle button {
      padding: 0.3rem 0.7rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .region-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    /* Theme Toggle */
    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.55rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1;
    }

    /* Auth area */
    .auth-area {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .auth-area button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-family: inherit;
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
    }
    .auth-area button:hover { background: var(--highlight-bg); }

    /* Navigation */
    .site-nav {
      border-top: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .site-nav ul {
      display: flex;
      list-style: none;
      gap: 0;
    }

    .site-nav a {
      display: block;
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--accent);
      text-decoration: none;
      border-bottom-color: var(--accent);
    }

    /* ===== Main Content ===== */
    main {
      padding: 2rem 0 3rem;
    }

    .section {
      margin-bottom: 2.5rem;
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    /* ===== Cards ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 2px 8px var(--shadow-hover);
    }

    .card-body { padding: 1.25rem; }

    /* ===== Section 1: Daily Report ===== */
    .daily-report .card-body { padding: 1.5rem 2rem; }

    .daily-report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .daily-report-date {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .daily-report-body {
      font-size: 0.92rem;
      line-height: 1.85;
      color: var(--text);
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .daily-report-body::-webkit-scrollbar { width: 4px; }
    .daily-report-body::-webkit-scrollbar-track { background: transparent; }
    .daily-report-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .daily-report-body h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      margin: 1.2rem 0 0.5rem;
    }

    .daily-report-body p { margin-bottom: 0.75rem; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--highlight-bg) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    .skeleton-line {
      height: 1rem;
      margin-bottom: 0.6rem;
      border-radius: 4px;
    }

    .skeleton-line:last-child { width: 60%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== Section 2: PESTLE Bento Grid ===== */
    .pestle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .pestle-box {
      min-height: 280px;
      display: flex;
      flex-direction: column;
    }

    .pestle-box-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .pestle-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: #fff;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
    }

    .pestle-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .pestle-articles {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .pestle-articles::-webkit-scrollbar { width: 3px; }
    .pestle-articles::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .pestle-article {
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid transparent;
    }

    .pestle-article:hover {
      background: var(--highlight-bg);
    }

    .pestle-article-title {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pestle-article-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.25rem;
    }

    .pestle-article-source {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .pestle-article-time {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .bookmark-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      font-size: 0.68rem;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .bookmark-btn:hover,
    .bookmark-btn.bookmarked {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ===== Section 3: CLA ===== */
    .cla-controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .cla-controls button {
      padding: 0.35rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      font-family: inherit;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .cla-controls button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .cla-layers {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .cla-layer {
      padding: 1rem 1.25rem;
      transition: background 0.3s;
    }

    /* Gradient from light to deep */
    .cla-layer[data-depth="0"] { background: var(--highlight-bg); }
    .cla-layer[data-depth="1"] { background: color-mix(in srgb, var(--surface) 70%, var(--accent) 8%); }
    .cla-layer[data-depth="2"] { background: color-mix(in srgb, var(--surface) 50%, var(--accent) 15%); }
    .cla-layer[data-depth="3"] { background: color-mix(in srgb, var(--surface) 30%, var(--accent) 22%); }

    .cla-layer-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .cla-layer-content {
      font-size: 0.85rem;
      line-height: 1.65;
      color: var(--text);
    }

    .cla-layer-content ul {
      list-style: none;
      padding: 0;
    }

    .cla-layer-content li {
      padding: 0.2rem 0;
      padding-left: 1rem;
      position: relative;
    }

    .cla-layer-content li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.55rem;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-soft);
    }

    .cla-meta-link {
      margin-top: 1rem;
      text-align: right;
    }

    .cla-meta-link a {
      font-size: 0.82rem;
      font-weight: 500;
    }

    /* ===== Section 4: Academic ===== */
    .academic-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
      overflow-x: auto;
    }

    .academic-tab {
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .academic-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .academic-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .academic-item {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--surface);
      transition: background 0.15s;
    }

    .academic-item:hover { background: var(--highlight-bg); }

    .academic-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 0.25rem;
    }

    .academic-title .weak-signal {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--accent-warm);
      background: var(--highlight-bg);
      border: 1px solid var(--accent-warm);
      padding: 0.05rem 0.35rem;
      border-radius: 3px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .academic-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    /* ===== Section 5: Foresight ===== */
    .foresight-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .foresight-input {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color 0.2s;
    }

    .foresight-input:focus {
      border-color: var(--accent);
    }

    .foresight-input::placeholder { color: var(--text-muted); }

    .btn-primary {
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-primary:hover { background: var(--accent-soft); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .foresight-answer {
      background: var(--highlight-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      font-size: 0.88rem;
      line-height: 1.75;
      display: none;
    }

    .foresight-answer.visible { display: block; }

    .foresight-history-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .foresight-history {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .foresight-history-item {
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s;
    }

    .foresight-history-item:hover { background: var(--highlight-bg); }

    .foresight-history-item-date {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* ===== Section 6: Media Sources ===== */
    .media-table-wrap {
      overflow-x: auto;
    }

    .media-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .media-table th {
      text-align: left;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 0.6rem 0.75rem;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .media-table td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--surface);
      color: var(--text);
    }

    .media-table tr:hover td { background: var(--highlight-bg); }

    .media-field-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      color: #fff;
    }

    .btn-admin {
      display: none;
      margin-top: 0.75rem;
    }

    .btn-admin.visible { display: inline-block; }

    .btn-secondary {
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ===== Footer ===== */
    .site-footer {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 1.25rem 0;
      text-align: center;
    }

    .footer-brand {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .footer-links a {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .footer-links a:hover { color: var(--accent); }

    /* ===== Modal (from ui-components, enhanced) ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      animation: fadeIn 0.2s;
    }

    .modal-content {
      background: var(--card);
      border-radius: 10px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px var(--shadow-hover);
    }

    .modal-wide { max-width: 800px; }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }

    .modal-body {
      padding: 1.25rem;
      overflow-y: auto;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .modal-body .article-source {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .modal-body .article-summary {
      margin-bottom: 1rem;
      color: var(--text);
    }

    .modal-body .article-link {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .modal-body .comment-section {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .comment-input-wrap {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .comment-input {
      flex: 1;
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.82rem;
      background: var(--card);
      color: var(--text);
      outline: none;
    }

    .comment-input:focus { border-color: var(--accent); }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 4px 12px var(--shadow-hover);
      transform: translateY(1rem);
      opacity: 0;
      transition: all 0.3s;
      z-index: 2000;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-error { background: var(--P); }

    /* ===== Loading ===== */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(253, 250, 247, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: 8px;
    }

    [data-theme="dark"] .loading-overlay {
      background: rgba(26, 20, 16, 0.7);
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ===== Utility ===== */
    .text-center { text-align: center; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-2 { margin-bottom: 1rem; }
    .hidden { display: none !important; }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .pestle-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .pestle-grid {
        grid-template-columns: 1fr;
      }

      .header-top {
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .site-logo {
        font-size: 1rem;
        width: 100%;
      }

      .header-controls {
        width: 100%;
        justify-content: space-between;
      }

      .daily-report .card-body {
        padding: 1rem;
      }

      .foresight-form {
        flex-direction: column;
      }

      .cla-layer { padding: 0.75rem 1rem; }

      .container { padding: 0 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="container">
      <div class="header-top">
        <div class="site-logo">Miratuku Future Insight News</div>
        <div class="header-controls">
          <div class="region-toggle">
            <button class="active" data-region="japan" onclick="toggleRegion('japan')">日本版</button>
            <button data-region="global" onclick="toggleRegion('global')">グローバル版</button>
          </div>
          <button class="theme-toggle" onclick="toggleTheme()" title="テーマ切替">A</button>
          <div class="auth-area" id="authArea">
            <button onclick="showAuthModal()">ログイン</button>
          </div>
        </div>
      </div>
      <nav class="site-nav">
        <ul>
          <li><a href="#section-report" class="active" data-nav="report">ホーム</a></li>
          <li><a href="#section-pestle" data-nav="pestle">PESTLEニュース</a></li>
          <li><a href="#section-academic" data-nav="academic">学術研究</a></li>
          <li><a href="#section-cla" data-nav="cla">CLA分析</a></li>
          <li><a href="#section-foresight" data-nav="foresight">未来洞察</a></li>
          <li><a href="#section-bookmarks" data-nav="bookmarks">ブックマーク</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main>
    <div class="container">

      <!-- Section 1: Daily Analysis Report -->
      <section class="section" id="section-report">
        <h2 class="section-title">本日の分析レポート</h2>
        <div class="card daily-report">
          <div class="card-body">
            <div class="daily-report-header">
              <span class="daily-report-date" id="reportDate">--</span>
            </div>
            <div class="daily-report-body" id="reportBody">
              <div class="skeleton skeleton-line" style="width:100%"></div>
              <div class="skeleton skeleton-line" style="width:95%"></div>
              <div class="skeleton skeleton-line" style="width:88%"></div>
              <div class="skeleton skeleton-line" style="width:92%"></div>
              <div class="skeleton skeleton-line" style="width:60%"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 2: PESTLE News -->
      <section class="section" id="section-pestle">
        <h2 class="section-title">PESTLEニュース</h2>
        <div class="pestle-grid" id="pestleGrid">
          <!-- Rendered by JS -->
        </div>
      </section>

      <!-- Section 3: CLA Analysis -->
      <section class="section" id="section-cla">
        <h2 class="section-title">因果階層分析 (CLA)</h2>
        <div class="card">
          <div class="card-body">
            <div class="cla-controls" id="claControls">
              <button class="active" data-period="latest">最新</button>
              <button data-period="q1">Q1</button>
              <button data-period="q2">Q2</button>
              <button data-period="q3">Q3</button>
              <button data-period="q4">Q4</button>
            </div>
            <div class="cla-layers" id="claLayers">
              <!-- Rendered by JS -->
            </div>
            <div class="cla-meta-link">
              <a href="#" id="claMetaLink">メタ分析レポートを読む &rarr;</a>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 4: Academic Research -->
      <section class="section" id="section-academic">
        <h2 class="section-title">学術研究</h2>
        <div class="card">
          <div class="card-body">
            <div class="academic-tabs" id="academicTabs">
              <button class="academic-tab active" data-field="自然科学">自然科学</button>
              <button class="academic-tab" data-field="工学">工学</button>
              <button class="academic-tab" data-field="社会科学">社会科学</button>
              <button class="academic-tab" data-field="人文学">人文学</button>
              <button class="academic-tab" data-field="芸術">芸術</button>
            </div>
            <div class="academic-list" id="academicList">
              <div class="empty-state">読み込み中...</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 5: Foresight -->
      <section class="section" id="section-foresight">
        <h2 class="section-title">未来洞察 / 問いかけ</h2>
        <div class="card">
          <div class="card-body">
            <div class="foresight-form">
              <input type="text" class="foresight-input" id="foresightInput"
                     placeholder="あなたの問題意識を記述してください...">
              <button class="btn-primary" id="foresightSubmit" onclick="askForesight()">問いかける</button>
            </div>
            <div class="foresight-answer" id="foresightAnswer"></div>
            <div class="foresight-history-title">過去の問いかけ</div>
            <div class="foresight-history" id="foresightHistory">
              <div class="empty-state">まだ問いかけがありません</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Bookmarks (hidden by default, shown on nav click) -->
      <section class="section hidden" id="section-bookmarks">
        <h2 class="section-title">ブックマーク</h2>
        <div class="card">
          <div class="card-body" id="bookmarkList">
            <div class="empty-state">ブックマークがありません</div>
          </div>
        </div>
      </section>

      <!-- Section 6: Media Sources -->
      <section class="section" id="section-media">
        <h2 class="section-title">メディアソース一覧</h2>
        <div class="card">
          <div class="card-body">
            <div class="media-table-wrap">
              <table class="media-table" id="mediaTable">
                <thead>
                  <tr>
                    <th>メディア名</th>
                    <th>分野</th>
                    <th>収集件数</th>
                    <th>最終取得</th>
                  </tr>
                </thead>
                <tbody id="mediaBody">
                  <tr><td colspan="4" class="empty-state">読み込み中...</td></tr>
                </tbody>
              </table>
            </div>
            <div class="btn-admin" id="mediaAddBtn">
              <button class="btn-secondary" onclick="showAddMediaModal()">メディアを追加</button>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-brand">提供: ミラツク</div>
      <div class="footer-links">
        <a href="guide.html">使い方ガイド</a>
        <a href="privacy.html">プライバシーポリシー</a>
      </div>
    </div>
  </footer>

  <!-- ===== Firebase SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- ===== Shared Modules ===== -->
  <script src="js/shared/firebase-config.js"></script>
  <script src="js/shared/i18n.js"></script>
  <script src="js/shared/ui-components.js"></script>
  <script src="js/shared/data-loader.js"></script>

  <script>
    /* =========================================================
       Miratuku Future Insight News — Main Application
       ========================================================= */

    // --- State ---
    let currentRegion = 'japan';
    let currentUser = null;
    let isAdmin = false;
    let bookmarks = JSON.parse(localStorage.getItem('miratuku_bookmarks') || '[]');
    let foresightHistoryData = JSON.parse(localStorage.getItem('miratuku_foresight') || '[]');
    let appData = {};

    // --- Theme ---
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('miratuku_theme', next);
    }

    (function initTheme() {
      const saved = localStorage.getItem('miratuku_theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

    // --- Auth ---
    auth.onAuthStateChanged(user => {
      currentUser = user;
      const area = document.getElementById('authArea');
      if (user) {
        // Check admin status
        isAdmin = (user.email === 'yuya@miratuku.com' || user.email === 'admin@miratuku.com');
        area.innerHTML = `
          <span>${esc(user.email.split('@')[0])}</span>
          <button onclick="auth.signOut()">ログアウト</button>
        `;
        if (isAdmin) {
          document.getElementById('mediaAddBtn').classList.add('visible');
        }
      } else {
        isAdmin = false;
        area.innerHTML = '<button onclick="showAuthModal()">ログイン</button>';
        document.getElementById('mediaAddBtn').classList.remove('visible');
      }
    });

    function showAuthModal() {
      const html = `
        <div style="display:flex;flex-direction:column;gap:0.75rem;">
          <input type="email" id="authEmail" class="foresight-input" placeholder="メールアドレス">
          <input type="password" id="authPass" class="foresight-input" placeholder="パスワード">
          <div style="display:flex;gap:0.5rem;">
            <button class="btn-primary" onclick="doLogin()">ログイン</button>
            <button class="btn-secondary" onclick="doSignup()">新規登録</button>
          </div>
          <div id="authError" style="color:var(--P);font-size:0.8rem;"></div>
        </div>
      `;
      showModal('ログイン', html);
    }

    async function doLogin() {
      const email = document.getElementById('authEmail').value;
      const pass = document.getElementById('authPass').value;
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        document.querySelector('.modal-overlay')?.remove();
        showToast('ログインしました');
      } catch (e) {
        document.getElementById('authError').textContent = e.message;
      }
    }

    async function doSignup() {
      const email = document.getElementById('authEmail').value;
      const pass = document.getElementById('authPass').value;
      try {
        await auth.createUserWithEmailAndPassword(email, pass);
        document.querySelector('.modal-overlay')?.remove();
        showToast('アカウントを作成しました');
      } catch (e) {
        document.getElementById('authError').textContent = e.message;
      }
    }

    // --- Navigation (scroll highlight) ---
    document.querySelectorAll('.site-nav a').forEach(link => {
      link.addEventListener('click', (e) => {
        // Show bookmarks section if clicking on bookmarks nav
        const nav = link.getAttribute('data-nav');
        if (nav === 'bookmarks') {
          document.getElementById('section-bookmarks').classList.remove('hidden');
          renderBookmarks();
        }
        document.querySelectorAll('.site-nav a').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      });
    });

    // --- Region Toggle ---
    function toggleRegion(region) {
      currentRegion = region;
      document.querySelectorAll('.region-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.region === region);
      });
      // Re-render PESTLE news with filter
      if (appData.news) {
        renderPestleNews(appData.news, region);
      }
    }

    // --- Init App ---
    async function initApp() {
      try {
        const [coreData, mediaSources, claData] = await Promise.all([
          DataLoader.loadAll(),
          DataLoader.loadNewsAppData('media_sources.json').catch(() => []),
          DataLoader.loadNewsAppData('cla_analysis.json').catch(() => null),
        ]);

        appData = { ...coreData, mediaSources, claData };

        renderDailyReport(coreData.ai);
        renderPestleNews(coreData.news, currentRegion);
        renderCLA(claData);
        renderAcademic(coreData.dailyPapers);
        renderForesight();
        renderMediaSources(mediaSources);

      } catch (err) {
        console.error('Failed to load data:', err);
        // Show graceful fallback
        renderDailyReport(null);
        renderPestleNewsFallback();
        renderCLAFallback();
        renderAcademicFallback();
        renderForesight();
        renderMediaSources([]);
      }
    }

    // --- Section 1: Daily Report ---
    function renderDailyReport(data) {
      const dateEl = document.getElementById('reportDate');
      const bodyEl = document.getElementById('reportBody');

      if (!data) {
        dateEl.textContent = formatDate(new Date().toISOString());
        bodyEl.innerHTML = '<div class="empty-state">レポートを読み込めませんでした。後ほど再度お試しください。</div>';
        return;
      }

      const reportDate = data.generated_at || data.date || new Date().toISOString();
      dateEl.textContent = formatDate(reportDate);

      // Build report HTML from AI analysis data
      let html = '';
      if (data.executive_summary) {
        html += `<p>${esc(data.executive_summary)}</p>`;
      }
      if (data.sections) {
        data.sections.forEach(section => {
          html += `<h3>${esc(section.title)}</h3>`;
          if (section.content) {
            html += `<p>${esc(section.content)}</p>`;
          }
          if (section.items) {
            section.items.forEach(item => {
              html += `<p>${esc(item)}</p>`;
            });
          }
        });
      } else if (data.summary) {
        html += `<p>${esc(data.summary)}</p>`;
      }
      if (!html) {
        html = '<div class="empty-state">本日のレポートはまだ生成されていません</div>';
      }

      bodyEl.innerHTML = html;
    }

    // --- Section 2: PESTLE News ---
    function renderPestleNews(data, region) {
      const grid = document.getElementById('pestleGrid');
      if (!data || !data.categories) {
        renderPestleNewsFallback();
        return;
      }

      const categories = ['P', 'E', 'S', 'T', 'L', 'En'];
      let html = '';

      categories.forEach(cat => {
        const meta = PESTLE_META[cat];
        let articles = data.categories[cat] || data.categories[meta.key] || [];

        // Filter by region
        if (region === 'japan') {
          articles = articles.filter(a => a.region === 'japan' || a.region === 'jp' || !a.region);
        } else if (region === 'global') {
          articles = articles.filter(a => a.region === 'global' || a.region === 'en' || !a.region);
        }

        const label = LANG === 'ja' ? meta.name_ja : meta.name_en;

        html += `
          <div class="card pestle-box">
            <div class="pestle-box-header">
              <span class="pestle-badge" style="background:${meta.color}">${cat} ${label}</span>
              <span class="pestle-count">${articles.length}件</span>
            </div>
            <div class="pestle-articles">
              ${articles.length === 0 ? '<div class="empty-state">記事なし</div>' :
                articles.slice(0, 15).map((a, i) => `
                  <div class="pestle-article" onclick="showArticleModal('${cat}', ${i})">
                    <div class="pestle-article-title">${esc(a.title_ja || a.title)}</div>
                    <div class="pestle-article-meta">
                      <span class="pestle-article-source">${esc(a.source || a.feed_name || '')}</span>
                      <span class="pestle-article-time">${timeAgo(a.published || a.date)}</span>
                    </div>
                    <div style="margin-top:0.2rem;">
                      <button class="bookmark-btn ${bookmarks.some(b => b.url === a.url) ? 'bookmarked' : ''}"
                              onclick="event.stopPropagation(); bookmarkArticle(${JSON.stringify(a).replace(/"/g, '&quot;')})">
                        ${bookmarks.some(b => b.url === a.url) ? '保存済' : '保存'}
                      </button>
                    </div>
                  </div>
                `).join('')
              }
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    function renderPestleNewsFallback() {
      const grid = document.getElementById('pestleGrid');
      const categories = ['P', 'E', 'S', 'T', 'L', 'En'];
      grid.innerHTML = categories.map(cat => {
        const meta = PESTLE_META[cat];
        return `
          <div class="card pestle-box">
            <div class="pestle-box-header">
              <span class="pestle-badge" style="background:${meta.color}">${cat} ${meta.name_ja}</span>
              <span class="pestle-count">0件</span>
            </div>
            <div class="pestle-articles">
              <div class="empty-state">データを読み込めませんでした</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function showArticleModal(cat, index) {
      const meta = PESTLE_META[cat];
      const articles = appData.news?.categories?.[cat] || appData.news?.categories?.[meta.key] || [];
      const a = articles[index];
      if (!a) return;

      const html = `
        <div class="article-source">${esc(a.source || a.feed_name || '')} / ${timeAgo(a.published || a.date)}</div>
        <div class="article-summary">${esc(a.summary_ja || a.summary || a.description || '要約なし')}</div>
        ${a.url ? `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="article-link">元記事を読む &rarr;</a>` : ''}
        <div class="comment-section">
          <div style="font-size:0.82rem;font-weight:500;color:var(--text-secondary);">コメント</div>
          <div id="commentsFor_${cat}_${index}" class="mt-1"></div>
          ${currentUser ? `
            <div class="comment-input-wrap mt-1">
              <input type="text" class="comment-input" id="commentInput_${cat}_${index}" placeholder="コメントを入力...">
              <button class="btn-secondary" onclick="postComment('${cat}_${index}', document.getElementById('commentInput_${cat}_${index}').value)">投稿</button>
            </div>
          ` : '<div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.5rem;">コメントするにはログインしてください</div>'}
        </div>
      `;

      showModal(a.title_ja || a.title, html, { wide: true });
      loadComments(`${cat}_${index}`);
    }

    // --- Section 3: CLA Analysis ---
    function renderCLA(data) {
      const layers = document.getElementById('claLayers');

      // Setup period controls
      document.querySelectorAll('.cla-controls button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.cla-controls button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderCLAContent(data, btn.dataset.period);
        });
      });

      renderCLAContent(data, 'latest');
    }

    function renderCLAContent(data, period) {
      const layers = document.getElementById('claLayers');

      const claLabels = [
        { key: 'litany', label: 'リタニー（表層事象）' },
        { key: 'systemic', label: '社会的原因（構造）' },
        { key: 'worldview', label: 'ディスコース（世界観）' },
        { key: 'myth', label: '神話・メタファー（深層）' },
      ];

      if (!data || !data.layers) {
        renderCLAFallback();
        return;
      }

      // Use period-specific data if available, otherwise use default
      const periodData = data.periods?.[period] || data;

      layers.innerHTML = claLabels.map((l, i) => {
        const items = periodData.layers?.[l.key] || [];
        return `
          <div class="cla-layer" data-depth="${i}">
            <div class="cla-layer-label">${l.label}</div>
            <div class="cla-layer-content">
              ${Array.isArray(items) ?
                `<ul>${items.map(item => `<li>${esc(item)}</li>`).join('')}</ul>` :
                `<p>${esc(items)}</p>`
              }
            </div>
          </div>
        `;
      }).join('');
    }

    function renderCLAFallback() {
      const layers = document.getElementById('claLayers');
      const claLabels = [
        'リタニー（表層事象）',
        '社会的原因（構造）',
        'ディスコース（世界観）',
        '神話・メタファー（深層）',
      ];
      layers.innerHTML = claLabels.map((label, i) => `
        <div class="cla-layer" data-depth="${i}">
          <div class="cla-layer-label">${label}</div>
          <div class="cla-layer-content"><p style="color:var(--text-muted);">分析データ準備中</p></div>
        </div>
      `).join('');
    }

    // --- Section 4: Academic Research ---
    let currentAcademicField = '自然科学';

    function renderAcademic(data) {
      // Setup tab clicks
      document.querySelectorAll('.academic-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.academic-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentAcademicField = tab.dataset.field;
          renderAcademicList(data, currentAcademicField);
        });
      });

      renderAcademicList(data, currentAcademicField);
    }

    function renderAcademicList(data, field) {
      const list = document.getElementById('academicList');

      if (!data || (!data.fields && !data.papers)) {
        list.innerHTML = '<div class="empty-state">学術論文データを読み込めませんでした</div>';
        return;
      }

      // Try to get papers by field
      let papers = [];
      if (data.fields && data.fields[field]) {
        papers = data.fields[field];
      } else if (data.papers) {
        papers = data.papers.filter(p => p.field === field || p.category === field);
      } else if (Array.isArray(data)) {
        papers = data.filter(p => p.field === field || p.category === field);
      }

      if (papers.length === 0) {
        list.innerHTML = `<div class="empty-state">「${esc(field)}」の論文データはありません</div>`;
        return;
      }

      list.innerHTML = papers.slice(0, 20).map(p => `
        <div class="academic-item">
          <div class="academic-title">
            ${esc(p.title_ja || p.title)}
            ${p.weak_signal ? '<span class="weak-signal">Weak Signal</span>' : ''}
          </div>
          <div class="academic-meta">
            <span>${esc(p.authors?.join(', ') || p.author || '')}</span>
            <span>${esc(p.journal || p.venue || '')}</span>
            <span>${esc(p.date || p.published || '')}</span>
          </div>
        </div>
      `).join('');
    }

    function renderAcademicFallback() {
      document.getElementById('academicList').innerHTML =
        '<div class="empty-state">学術論文データを読み込めませんでした</div>';
    }

    // --- Section 5: Foresight ---
    function renderForesight() {
      renderForesightHistory();

      // Enter key support
      document.getElementById('foresightInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') askForesight();
      });
    }

    async function askForesight() {
      const input = document.getElementById('foresightInput');
      const question = input.value.trim();
      if (!question) return;

      const submitBtn = document.getElementById('foresightSubmit');
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      const answerEl = document.getElementById('foresightAnswer');
      answerEl.classList.add('visible');
      answerEl.innerHTML = '<div class="skeleton skeleton-line" style="width:100%"></div><div class="skeleton skeleton-line" style="width:80%"></div>';

      try {
        // Try to post to Firestore for processing
        if (currentUser) {
          await db.collection('foresight_questions').add({
            question,
            userId: currentUser.uid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
        }

        // Save to local history
        const entry = {
          question,
          date: new Date().toISOString(),
          answer: '回答を生成中です。しばらくお待ちください...',
        };
        foresightHistoryData.unshift(entry);
        localStorage.setItem('miratuku_foresight', JSON.stringify(foresightHistoryData.slice(0, 50)));

        answerEl.innerHTML = `<p>${esc(entry.answer)}</p>`;
        input.value = '';
        renderForesightHistory();

      } catch (err) {
        console.error('Foresight error:', err);
        answerEl.innerHTML = '<p style="color:var(--P);">送信に失敗しました。再度お試しください。</p>';
      }

      submitBtn.disabled = false;
      submitBtn.textContent = '問いかける';
    }

    function renderForesightHistory() {
      const container = document.getElementById('foresightHistory');
      if (foresightHistoryData.length === 0) {
        container.innerHTML = '<div class="empty-state">まだ問いかけがありません</div>';
        return;
      }

      container.innerHTML = foresightHistoryData.slice(0, 10).map(item => `
        <div class="foresight-history-item" onclick="showForesightDetail(${JSON.stringify(item).replace(/"/g, '&quot;')})">
          <div>${esc(truncate(item.question, 80))}</div>
          <div class="foresight-history-item-date">${formatDate(item.date)}</div>
        </div>
      `).join('');
    }

    function showForesightDetail(item) {
      const html = `
        <div style="margin-bottom:1rem;">
          <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem;">${formatDate(item.date)}</div>
          <div style="font-weight:500;margin-bottom:1rem;">${esc(item.question)}</div>
          <div style="background:var(--surface);padding:1rem;border-radius:8px;line-height:1.7;">${esc(item.answer || '回答待ち')}</div>
        </div>
      `;
      showModal('問いかけの詳細', html);
    }

    // --- Bookmarks ---
    function bookmarkArticle(article) {
      const idx = bookmarks.findIndex(b => b.url === article.url);
      if (idx >= 0) {
        bookmarks.splice(idx, 1);
        showToast('ブックマークを解除しました');
      } else {
        bookmarks.push({
          title: article.title_ja || article.title,
          url: article.url,
          source: article.source || article.feed_name,
          date: article.published || article.date,
          savedAt: new Date().toISOString(),
        });
        showToast('ブックマークに保存しました');
      }
      localStorage.setItem('miratuku_bookmarks', JSON.stringify(bookmarks));

      // Re-render PESTLE to update button states
      if (appData.news) {
        renderPestleNews(appData.news, currentRegion);
      }
    }

    function renderBookmarks() {
      const container = document.getElementById('bookmarkList');
      if (bookmarks.length === 0) {
        container.innerHTML = '<div class="empty-state">ブックマークがありません</div>';
        return;
      }

      container.innerHTML = bookmarks.map((b, i) => `
        <div class="academic-item">
          <div class="academic-title">
            ${b.url ? `<a href="${esc(b.url)}" target="_blank" rel="noopener">${esc(b.title)}</a>` : esc(b.title)}
          </div>
          <div class="academic-meta">
            <span>${esc(b.source || '')}</span>
            <span>${formatDate(b.date)}</span>
            <button class="bookmark-btn bookmarked" onclick="removeBookmark(${i})">解除</button>
          </div>
        </div>
      `).join('');
    }

    function removeBookmark(index) {
      bookmarks.splice(index, 1);
      localStorage.setItem('miratuku_bookmarks', JSON.stringify(bookmarks));
      renderBookmarks();
      showToast('ブックマークを解除しました');
    }

    // --- Comments ---
    async function postComment(articleId, text) {
      if (!text?.trim() || !currentUser) return;

      try {
        await db.collection('article_comments').add({
          articleId,
          text: text.trim(),
          userId: currentUser.uid,
          userEmail: currentUser.email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        showToast('コメントを投稿しました');
        loadComments(articleId);
        const input = document.getElementById(`commentInput_${articleId}`);
        if (input) input.value = '';
      } catch (err) {
        console.error('Comment error:', err);
        showToast('コメントの投稿に失敗しました', 'error');
      }
    }

    async function loadComments(articleId) {
      const container = document.getElementById(`commentsFor_${articleId}`);
      if (!container) return;

      try {
        const snap = await db.collection('article_comments')
          .where('articleId', '==', articleId)
          .orderBy('createdAt', 'desc')
          .limit(20)
          .get();

        if (snap.empty) {
          container.innerHTML = '<div style="font-size:0.78rem;color:var(--text-muted);">コメントはありません</div>';
          return;
        }

        container.innerHTML = snap.docs.map(doc => {
          const d = doc.data();
          return `
            <div style="padding:0.4rem 0;border-bottom:1px solid var(--surface);font-size:0.82rem;">
              <span style="font-weight:500;color:var(--accent-soft);">${esc(d.userEmail?.split('@')[0] || 'User')}</span>
              <span style="color:var(--text-muted);font-size:0.72rem;margin-left:0.5rem;">${d.createdAt ? timeAgo(d.createdAt.toDate().toISOString()) : ''}</span>
              <div style="margin-top:0.2rem;color:var(--text);">${esc(d.text)}</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = '';
      }
    }

    // --- Section 6: Media Sources ---
    function renderMediaSources(data) {
      const tbody = document.getElementById('mediaBody');
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">メディアソースデータがありません</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(m => {
        const catMeta = PESTLE_META[m.category] || {};
        const color = catMeta.color || 'var(--text-muted)';
        const fieldName = catMeta.name_ja || m.category || m.field || '--';
        return `
          <tr>
            <td>${esc(m.name)}</td>
            <td><span class="media-field-badge" style="background:${color}">${esc(fieldName)}</span></td>
            <td>${m.count ?? '--'}</td>
            <td>${m.last_fetched ? formatDate(m.last_fetched) : '--'}</td>
          </tr>
        `;
      }).join('');
    }

    function showAddMediaModal() {
      if (!isAdmin) return;
      const html = `
        <div style="display:flex;flex-direction:column;gap:0.75rem;">
          <input type="text" id="newMediaName" class="foresight-input" placeholder="メディア名">
          <input type="url" id="newMediaUrl" class="foresight-input" placeholder="RSS URL">
          <select id="newMediaCat" class="foresight-input" style="padding:0.6rem 0.8rem;">
            <option value="P">政治 (P)</option>
            <option value="E">経済 (E)</option>
            <option value="S">社会 (S)</option>
            <option value="T">技術 (T)</option>
            <option value="L">法律 (L)</option>
            <option value="En">環境 (En)</option>
          </select>
          <button class="btn-primary" onclick="addMedia()">追加</button>
        </div>
      `;
      showModal('メディアソースを追加', html);
    }

    async function addMedia() {
      const name = document.getElementById('newMediaName').value.trim();
      const url = document.getElementById('newMediaUrl').value.trim();
      const category = document.getElementById('newMediaCat').value;
      if (!name || !url) return;

      try {
        await db.collection('media_sources').add({
          name, url, category,
          addedBy: currentUser?.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        showToast('メディアソースを追加しました');
        document.querySelector('.modal-overlay')?.remove();
      } catch (err) {
        showToast('追加に失敗しました', 'error');
      }
    }

    // --- Start ---
    initApp();
  </script>
</body>
</html>
